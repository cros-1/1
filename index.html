<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام النماذج الميدانية - النسخة الاحترافية الكاملة</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f4f8;color:#1c2833;min-height:100vh;}
.page{display:none;min-height:100vh;background:#f0f4f8;}
.hdr{color:#fff;padding:20px 16px 16px;text-align:center;background:linear-gradient(135deg,#1a5276,#1f618d);box-shadow:0 3px 10px rgba(0,0,0,.2);}
.hdr h1{font-size:1.3rem;font-weight:700;margin-bottom:3px;}
.hdr p{font-size:.75rem;opacity:.8;}
.hw{padding:16px;max-width:520px;margin:0 auto;}
.st{font-size:.7rem;font-weight:700;color:#7f8c8d;letter-spacing:1px;margin:16px 0 9px;}
.fg{display:flex;flex-direction:column;gap:9px;}
.fc{background:#fff;border:1px solid #d5e8f0;border-radius:14px;padding:14px 15px;display:flex;align-items:center;gap:13px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.07);border-right:5px solid transparent;width:100%;text-align:right;font-family:inherit;}
.fc:active{opacity:.85;}
.ic{font-size:1.9rem;width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.inf{flex:1;}.nm{font-weight:700;font-size:.93rem;margin-bottom:2px;}.ds{font-size:.73rem;color:#7f8c8d;}.ar{color:#7f8c8d;font-size:1.1rem;}
.cb{border-right-color:#2e86c1;}.cb .ic{background:#eaf4fb;}
.cg{border-right-color:#1e8449;}.cg .ic{background:#eafaf1;}
.co{border-right-color:#d35400;}.co .ic{background:#fef5e7;}
.cr{border-right-color:#c0392b;}.cr .ic{background:#fdedec;}
.ck{border-right-color:#b7950b;}.ck .ic{background:#fef9e7;}
.ct{border-right-color:#148f77;}.ct .ic{background:#e8f8f5;}
.inner{max-width:520px;margin:0 auto;padding:12px;}
.phdr{display:flex;align-items:center;gap:10px;padding:13px 15px;color:#fff;}
.bk{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:8px;padding:5px 13px;cursor:pointer;font-size:1.3rem;line-height:1;}
.pt{font-weight:700;font-size:1rem;}.ps{font-size:.73rem;opacity:.8;}
.card{background:#fff;border:1px solid #d5e8f0;border-radius:10px;padding:12px;margin-bottom:11px;box-shadow:0 2px 7px rgba(0,0,0,.05);}
.card h2{font-size:.93rem;color:#1a5276;border-bottom:2px solid #d5e8f0;padding-bottom:5px;margin-bottom:9px;}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:7px;align-items:flex-start;}
.fl{display:flex;flex-direction:column;flex:1;min-width:115px;}
.fl label{font-size:.73rem;color:#7f8c8d;margin-bottom:3px;}
.ff{display:flex;flex-direction:column;margin-bottom:8px;}
.ff label{font-size:.73rem;color:#7f8c8d;margin-bottom:3px;}
input, select, textarea { border:1px solid #d5e8f0; border-radius:6px; padding:8px; font-size:.84rem; font-family:inherit; background:#f9fbfc; width:100%; margin-bottom:5px;}
.rg{display:flex;gap:11px;margin-top:3px;flex-wrap:wrap;}
.rg label{display:flex;align-items:center;gap:4px;font-size:.84rem;cursor:pointer;}
.btn-add { background:#1a5276; color:#fff; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; font-size:0.75rem; margin-top:5px; margin-left:5px;}
.item-row { background:#f8fbff; border:1px solid #eaf2f8; padding:8px; border-radius:8px; margin-bottom:8px; position:relative; }
.btn-del { position:absolute; left:5px; top:5px; color:#e74c3c; border:none; background:none; cursor:pointer; font-weight:bold;}
.send-btn{width:100%;padding:14px;background:#25d366;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
</style>
</head>
<body>

<div id="pg-home" style="display:block;">
  <div class="hdr">
    <h1>🚑 نظام النماذج الميدانية</h1>
    <p>الإصدار المطور - جميع النماذج</p>
  </div>
  <div class="hw">
    <div class="st">نماذج المناوبة</div>
    <div class="fg">
      <button class="fc cb" onclick="show('pg-shift')"><div class="ic">📋</div><div class="inf"><div class="nm">نموذج نهاية المناوبة</div><div class="ds">البلاغات، المركبات، الغياب، الطاقم</div></div><div class="ar">‹</div></button>
      <button class="fc ct" onclick="show('pg-moshr')"><div class="ic">📊</div><div class="inf"><div class="nm">مؤشر المناوبة</div><div class="ds">متوسط وقت الاستجابة وجملة الختام</div></div><div class="ar">‹</div></button>
    </div>
    <div class="st">نماذج الصيانة</div>
    <div class="fg">
      <button class="fc cg" onclick="show('pg-oil')"><div class="ic">🛢️</div><div class="inf"><div class="nm">نموذج تغيير الزيت</div><div class="ds">تسجيل بيانات تغيير زيت المركبات</div></div><div class="ar">‹</div></button>
      <button class="fc co" onclick="show('pg-device')"><div class="ic">🔧</div><div class="inf"><div class="nm">نموذج صيانة جهاز</div><div class="ds">صيانة الأجهزة الطبية والميدانية</div></div><div class="ar">‹</div></button>
      <button class="fc cr" onclick="show('pg-vm')"><div class="ic">🚑</div><div class="inf"><div class="nm">نموذج صيانة مركبة</div><div class="ds">تسجيل أعطال وطلبات الصيانة</div></div><div class="ar">‹</div></button>
    </div>
    <div class="st">نماذج أخرى</div>
    <div class="fg">
      <button class="fc ck" onclick="show('pg-rosc')"><div class="ic">❤️</div><div class="inf"><div class="nm">نموذج ROSC</div><div class="ds">تقرير إنعاش قلبي رئوي ناجح</div></div><div class="ar">‹</div></button>
    </div>
  </div>
</div>

<div id="pg-shift" class="page">
  <div class="phdr" style="background:#1a5276;"><button class="bk" onclick="show('pg-home')">›</button><div><div class="pt">نهاية المناوبة</div></div></div>
  <div class="inner">
    <div class="card">
        <div class="row">
            <div class="fl"><label>التاريخ</label><input type="date" id="s-date"></div>
            <div class="fl"><label>الفترة</label><select id="s-period"><option>صباحية</option><option>مسائية</option></select></div>
        </div>
    </div>
    <div class="card">
        <h2>📊 المؤشر</h2>
        <input type="text" id="s-ir" placeholder="وقت الاستجابة (دقيقة)">
        <textarea id="s-in" placeholder="ملاحظات المؤشر..."></textarea>
    </div>
    <div class="card">
        <h2>⚡ التدخل السريع</h2>
        <div id="s-fast-list"></div>
        <button class="btn-add" onclick="addItem('s-fast-list', 'استجابة')">➕ إضافة استجابة</button>
        <button class="btn-add" onclick="addItem('s-fast-list', 'استجابة داعمة')">➕ إضافة استجابة داعمة</button>
    </div>
    <div class="card">
        <h2>🚑 المركبات</h2>
        <div class="row">
            <div class="fl"><label>عاملة</label><input type="number" id="s-v-ok"></div>
            <div class="fl"><label>احتياط</label><input type="number" id="s-v-res"></div>
            <div class="fl"><label>عطل</label><input type="number" id="s-v-bad"></div>
        </div>
        <textarea id="s-v-note" placeholder="ملاحظات أعطال المركبات..."></textarea>
    </div>
    <div class="card">
        <h2>👥 الغياب والمتأخرين</h2>
        <div id="s-abs-list"></div>
        <button class="btn-add" onclick="addItem('s-abs-list', 'اسم الشخص')">➕ إضافة اسم</button>
    </div>
    <div class="card">
        <h2>📝 ملاحظات عامة</h2>
        <textarea id="s-gen-note" placeholder="أي ملاحظات إضافية..."></textarea>
    </div>
    <div class="card">
        <h2>👤 معلومات الطاقم</h2>
        <input type="text" id="s-chief" placeholder="اسم كبير المسعفين">
        <input type="text" id="s-asst" placeholder="اسم المساعد">
    </div>
    <button class="send-btn" onclick="sendShift()">📤 إرسال عبر الواتساب</button>
  </div>
</div>

<div id="pg-moshr" class="page">
    <div class="phdr" style="background:#148f77;"><button class="bk" onclick="show('pg-home')">›</button><div><div class="pt">مؤشر المناوبة</div></div></div>
    <div class="inner">
        <div class="card">
            <label>التاريخ</label><input type="date" id="m-date">
            <label>المناوبة</label><select id="m-period"><option>صباحية</option><option>مسائية</option></select>
            <label>وقت الاستجابة</label><input type="text" id="m-val" placeholder="مثلاً: 8 دقائق">
            <label>جملة الختام</label>
            <select id="m-end">
                <option value="بفخر واعتزاز، نتقدم بجزيل الشكر والعرفان لجهود الزملاء الذين كان لهم - بعد توفيق الله - دور بطولي في إنقاذ الأرواح 🌹">الشكر والتقدير (طويل) 🌹</option>
                <option value="الله يعطيكم العافية جميعاً ماقصرتوا 🌹">تحية قصيرة 🌹</option>
            </select>
        </div>
        <button class="send-btn" style="background:#148f77" onclick="sendMoshr()">📤 إرسال عبر الواتساب</button>
    </div>
</div>

<div id="pg-oil" class="page">
    <div class="phdr" style="background:#1e8449;"><button class="bk" onclick="show('pg-home')">›</button><div><div class="pt">تغيير الزيت</div></div></div>
    <div class="inner">
        <div class="card">
            <label>رقم المركبة</label><input type="text" id="o-num">
            <label>العداد الحالي</label><input type="text" id="o-km">
            <label>موقع التغيير</label><input type="text" id="o-loc">
            <textarea id="o-note" placeholder="ملاحظات..."></textarea>
        </div>
        <button class="send-btn" style="background:#1e8449" onclick="sendOil()">📤 إرسال عبر الواتساب</button>
    </div>
</div>

<div id="pg-device" class="page">
    <div class="phdr" style="background:#d35400;"><button class="bk" onclick="show('pg-home')">›</button><div><div class="pt">صيانة جهاز</div></div></div>
    <div class="inner">
        <div class="card">
            <label>اسم الجهاز</label><input type="text" id="d-name">
            <label>رقم الجهاز</label><input type="text" id="d-id">
            <label>نوع المشكلة</label><textarea id="d-prob"></textarea>
        </div>
        <button class="send-btn" style="background:#d35400" onclick="sendDevice()">📤 إرسال عبر الواتساب</button>
    </div>
</div>

<div id="pg-vm" class="page">
    <div class="phdr" style="background:#c0392b;"><button class="bk" onclick="show('pg-home')">›</button><div><div class="pt">صيانة مركبة</div></div></div>
    <div class="inner">
        <div class="card">
            <label>رقم المركبة</label><input type="text" id="v-num">
            <label>العداد</label><input type="text" id="v-km">
            <label>الأولوية</label>
            <select id="v-pri"><option>عادية</option><option>عاجلة</option><option>حرجة</option></select>
            <label>وصف العطل</label><textarea id="v-desc"></textarea>
        </div>
        <button class="send-btn" style="background:#c0392b" onclick="sendVM()">📤 إرسال عبر الواتساب</button>
    </div>
</div>

<div id="pg-rosc" class="page">
    <div class="phdr" style="background:#b7950b;"><button class="bk" onclick="show('pg-home')">›</button><div><div class="pt">نموذج ROSC</div></div></div>
    <div class="inner">
        <div class="card">
            <label>رقم البلاغ</label><input type="text" id="r-num">
            <label>الموقع</label><input type="text" id="r-loc">
            <label>الطاقم</label><textarea id="r-team" placeholder="الأسماء..."></textarea>
            <label>التفاصيل</label><textarea id="r-det"></textarea>
        </div>
        <button class="send-btn" style="background:#b7950b" onclick="sendRosc()">📤 إرسال عبر الواتساب</button>
    </div>
</div>

<script>
function show(id) {
    document.querySelectorAll('.page, #pg-home').forEach(p => p.style.display = 'none');
    document.getElementById(id).style.display = 'block';
    window.scrollTo(0,0);
}

function addItem(containerId, label) {
    const container = document.getElementById(containerId);
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `<small>${label}:</small><input type="text" class="item-val" data-label="${label}"><button class="btn-del" onclick="this.parentElement.remove()">✕</button>`;
    container.appendChild(div);
}

function sendWA(text) {
    // تشفير URI هو الحل لعلامات الاستفهام
    const url = "https://wa.me/?text=" + encodeURIComponent(text);
    window.open(url, '_blank');
}

function sendShift() {
    let m = `*📋 نموذج نهاية المناوبة*\n➖➖➖➖➖➖➖➖\n`;
    m += `📅 التاريخ: ${document.getElementById('s-date').value}\n🕒 الفترة: ${document.getElementById('s-period').value}\n\n`;
    m += `📊 *المؤشر:*\n⏱️ الاستجابة: ${document.getElementById('s-ir').value} د\n📝 ملاحظة: ${document.getElementById('s-in').value}\n\n`;
    
    m += `⚡ *التدخل السريع:*\n`;
    document.querySelectorAll('#s-fast-list .item-val').forEach(i => {
        if(i.value) m += `🔹 ${i.getAttribute('data-label')}: ${i.value}\n`;
    });

    m += `\n🚑 *المركبات:*\n✅ عاملة: ${document.getElementById('s-v-ok').value}\n⏳ احتياط: ${document.getElementById('s-v-res').value}\n❌ عطل: ${document.getElementById('s-v-bad').value}\n`;
    if(document.getElementById('s-v-note').value) m += `⚠️ ملاحظة: ${document.getElementById('s-v-note').value}\n`;

    let abs = Array.from(document.querySelectorAll('#s-abs-list input')).map(i => i.value).filter(v => v);
    if(abs.length) m += `\n👥 *الغياب/المتأخرين:*\n- ${abs.join('\n- ')}\n`;

    if(document.getElementById('s-gen-note').value) m += `\n📝 *ملاحظات عامة:*\n${document.getElementById('s-gen-note').value}\n`;
    
    m += `\n👤 *الطاقم:*\n- كبير المسعفين: ${document.getElementById('s-chief').value}\n- المساعد: ${document.getElementById('s-asst').value}`;
    sendWA(m);
}

function sendMoshr() {
    let m = `*📊 مؤشر المناوبة*\n\n📅 التاريخ: ${document.getElementById('m-date').value}\n🕒 المناوبة: ${document.getElementById('m-period').value}\n⏱️ وقت الاستجابة: ${document.getElementById('m-val').value}\n\n${document.getElementById('m-end').value}`;
    sendWA(m);
}

function sendOil() {
    let m = `*🛢️ نموذج تغيير الزيت*\n\n🚑 رقم المركبة: ${document.getElementById('o-num').value}\n🛣️ العداد: ${document.getElementById('o-km').value}\n📍 الموقع: ${document.getElementById('o-loc').value}\n📝 ملاحظة: ${document.getElementById('o-note').value}`;
    sendWA(m);
}

function sendDevice() {
    let m = `*🔧 صيانة جهاز*\n\n📟 الجهاز: ${document.getElementById('d-name').value}\n🆔 الرقم: ${document.getElementById('d-id').value}\n⚠️ المشكلة: ${document.getElementById('d-prob').value}`;
    sendWA(m);
}

function sendVM() {
    let m = `*🚑 صيانة مركبة*\n\n🔢 رقم المركبة: ${document.getElementById('v-num').value}\n🛣️ العداد: ${document.getElementById('v-km').value}\n🚩 الأولوية: ${document.getElementById('v-pri').value}\n🛠️ العطل: ${document.getElementById('v-desc').value}`;
    sendWA(m);
}

function sendRosc() {
    let m = `*❤️ تقرير حالة ROSC*\n\n🔢 رقم البلاغ: ${document.getElementById('r-num').value}\n📍 الموقع: ${document.getElementById('r-loc').value}\n👥 الطاقم: ${document.getElementById('r-team').value}\n📝 التفاصيل: ${document.getElementById('r-det').value}`;
    sendWA(m);
}

window.onload = function() {
    let t = new Date().toISOString().split('T')[0];
    document.querySelectorAll('input[type="date"]').forEach(i => i.value = t);
};
</script>
</body>
</html>
