<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النماذج الميدانية - النسخة الاحترافية</title>
<style>
/* التنسيقات الأساسية - لم يتم تغيير أي شيء في الهوية البصرية */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f4f8;color:#1c2833;min-height:100vh;}
.page{display:none;min-height:100vh;background:#f0f4f8;}
.hdr{color:#fff;padding:20px 16px 16px;text-align:center;background:linear-gradient(135deg,#1a5276,#1f618d);box-shadow:0 3px 10px rgba(0,0,0,.2);}
.hdr h1{font-size:1.3rem;font-weight:700;margin-bottom:3px;}
.hdr p{font-size:.75rem;opacity:.8;}
.hw{padding:16px;max-width:520px;margin:0 auto;}
.st{font-size:.7rem;font-weight:700;color:#7f8c8d;letter-spacing:1px;margin:16px 0 9px;}
.fg{display:flex;flex-direction:column;gap:9px;}
.fc{background:#fff;border:1px solid #d5e8f0;border-radius:14px;padding:14px 15px;display:flex;align-items:center;gap:13px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.07);border-right:5px solid transparent;width:100%;text-align:right;font-family:inherit;}
.ic{font-size:1.9rem;width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.inf{flex:1;}.nm{font-weight:700;font-size:.93rem;margin-bottom:2px;}.ds{font-size:.73rem;color:#7f8c8d;}.ar{color:#7f8c8d;font-size:1.1rem;}
.cb{border-right-color:#2e86c1;}.cb .ic{background:#eaf4fb;}
.ct{border-right-color:#148f77;}.ct .ic{background:#e8f8f5;}
.inner{max-width:520px;margin:0 auto;padding:12px;}
.phdr{display:flex;align-items:center;gap:10px;padding:13px 15px;color:#fff;}
.bk{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:8px;padding:5px 13px;cursor:pointer;font-size:1.3rem;line-height:1;}
.card{background:#fff;border:1px solid #d5e8f0;border-radius:10px;padding:12px;margin-bottom:11px;box-shadow:0 2px 7px rgba(0,0,0,.05);}
.card h2{font-size:.93rem;color:#1a5276;border-bottom:2px solid #d5e8f0;padding-bottom:5px;margin-bottom:9px;}
input, select, textarea { width:100%; padding:8px; border:1px solid #d5e8f0; border-radius:6px; margin-bottom:8px; font-family:inherit;}
.send-btn{width:100%;padding:12px;background:#25d366;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-add { background:#1a5276; color:#fff; border:none; padding:8px; border-radius:6px; cursor:pointer; font-size:0.8rem; margin-bottom:10px; }
.item-row { background:#f9fbff; border:1px solid #d5e8f0; padding:10px; border-radius:8px; margin-bottom:10px; position:relative; }
.btn-del { position:absolute; left:5px; top:5px; color:red; border:none; background:none; cursor:pointer; }
</style>
</head>
<body>

<div id="pg-home" style="display:block;">
  <div class="hdr">
    <h1>🚑 نظام النماذج الميدانية</h1>
    <p>حل مشكلة الرموز - نسخة المطور المحترف</p>
  </div>
  <div class="hw">
    <div class="st">نماذج المناوبة</div>
    <div class="fg">
      <button class="fc cb" onclick="show('pg-shift')"><div class="ic">📋</div><div class="inf"><div class="nm">نموذج نهاية المناوبة</div><div class="ds">البلاغات والمركبات والغياب</div></div></button>
      <button class="fc ct" onclick="show('pg-moshr')"><div class="ic">📊</div><div class="inf"><div class="nm">مؤشر المناوبة</div><div class="ds">وقت الاستجابة والختام</div></div></button>
    </div>
  </div>
</div>

<div id="pg-shift" class="page">
  <div class="phdr" style="background:#1a5276;"><button class="bk" onclick="show('pg-home')">›</button><div><b>نهاية المناوبة</b></div></div>
  <div class="inner">
    <div class="card">
        <label>التاريخ</label><input type="date" id="s-date">
        <label>المناوبة</label><select id="s-per"><option>صباحية</option><option>مسائية</option></select>
    </div>
    <div class="card">
        <h2>📊 المؤشر</h2>
        <input type="text" id="s-ir" placeholder="متوسط وقت الاستجابة">
        <textarea id="s-in" placeholder="ملاحظات المؤشر"></textarea>
    </div>
    <div class="card">
        <h2>⚡ التدخل السريع</h2>
        <div id="s-fast-list"></div>
        <button class="btn-add" onclick="addItem('s-fast-list', 'استجابة')">➕ إضافة استجابة</button>
        <button class="btn-add" onclick="addItem('s-fast-list', 'استجابة داعمة')">➕ إضافة استجابة داعمة</button>
    </div>
    <div class="card">
        <h2>🚑 المركبات</h2>
        <div style="display:flex; gap:5px;">
            <input type="number" id="s-v-ok" placeholder="عاملة">
            <input type="number" id="s-v-res" placeholder="احتياط">
            <input type="number" id="s-v-bad" placeholder="عطل">
        </div>
    </div>
    <button class="send-btn" onclick="sendShift()">📤 إرسال عبر الواتساب</button>
  </div>
</div>

<div id="pg-moshr" class="page">
    <div class="phdr" style="background:#148f77;"><button class="bk" onclick="show('pg-home')">›</button><div><b>مؤشر المناوبة</b></div></div>
    <div class="inner">
        <div class="card">
            <label>التاريخ</label><input type="date" id="m-date">
            <label>وقت الاستجابة</label><input type="text" id="m-val" placeholder="مثلاً: 8 دقائق">
            <label>جملة الختام</label>
            <select id="m-end">
                <option value="الله يعطيكم العافية جميعاً ماقصرتوا 🌹">تحية 1 🌹</option>
                <option value="جزاكم الله خيراً على جهودكم المبذولة 🌹">تحية 2 🌹</option>
            </select>
        </div>
        <button class="send-btn" style="background:#148f77;" onclick="sendMoshr()">📤 إرسال عبر الواتساب</button>
    </div>
</div>

<script>
// دالة التنقل بين الصفحات
function show(id) {
    document.querySelectorAll('.page, #pg-home').forEach(p => p.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

// دالة إضافة الحقول الديناميكية (استجابة / استجابة داعمة)
function addItem(containerId, type) {
    const container = document.getElementById(containerId);
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `
        <small>${type}</small>
        <input type="text" class="item-val" data-type="${type}" placeholder="التفاصيل...">
        <button class="btn-del" onclick="this.parentElement.remove()">✕</button>
    `;
    container.appendChild(div);
}

// الـ Helper السحري لحل مشكلة الرموز (التشفير الصارم)
function sendToWhatsApp(text) {
    // تشفير النص بالكامل لضمان سلامة الرموز التعبيرية
    const encodedText = encodeURIComponent(text);
    const url = "https://wa.me/?text=" + encodedText;
    window.open(url, '_blank');
}

// معالجة نموذج نهاية المناوبة
function sendShift() {
    const line = "➖➖➖➖➖➖➖➖";
    let msg = "*" + "📋 نموذج نهاية المناوبة" + "*\n" + line + "\n";
    msg += "📅 *التاريخ:* " + document.getElementById('s-date').value + "\n";
    msg += "🕒 *المناوبة:* " + document.getElementById('s-per').value + "\n\n";
    
    msg += "📊 *المؤشر:*\n";
    msg += "⏱️ استجابة: " + (document.getElementById('s-ir').value || '0') + " د\n";
    if(document.getElementById('s-in').value) msg += "📝 ملاحظة: " + document.getElementById('s-in').value + "\n";
    
    msg += "\n⚡ *التدخل السريع:*\n";
    document.querySelectorAll('#s-fast-list .item-row').forEach(row => {
        const type = row.querySelector('.item-val').dataset.type;
        const val = row.querySelector('.item-val').value;
        if(val) msg += "🔹 " + type + ": " + val + "\n";
    });

    msg += "\n🚑 *المركبات:*\n";
    msg += "✅ عاملة: " + (document.getElementById('s-v-ok').value || '0') + "\n";
    msg += "⏳ احتياط: " + (document.getElementById('s-v-res').value || '0') + "\n";
    msg += "❌ عطل: " + (document.getElementById('s-v-bad').value || '0') + "\n";

    sendToWhatsApp(msg);
}

// معالجة نموذج المؤشر
function sendMoshr() {
    let msg = "*📊 مؤشر المناوبة*" + "\n\n";
    msg += "📅 *التاريخ:* " + document.getElementById('m-date').value + "\n";
    msg += "⏱️ *وقت الاستجابة:* " + document.getElementById('m-val').value + "\n\n";
    msg += document.getElementById('m-end').value;
    
    sendToWhatsApp(msg);
}

// تعيين تاريخ اليوم تلقائياً
window.onload = function() {
    const today = new Date().toISOString().split('T')[0];
    document.querySelectorAll('input[type="date"]').forEach(i => i.value = today);
};
</script>
</body>
</html>
