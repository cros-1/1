<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام النماذج الميدانية - النسخة النهائية</title>
<style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f4f8;color:#1c2833;min-height:100vh;}
    .page{display:none;min-height:100vh;background:#f0f4f8;}
    .hdr{color:#fff;padding:20px 16px 16px;text-align:center;background:linear-gradient(135deg,#1a5276,#1f618d);box-shadow:0 3px 10px rgba(0,0,0,.2);}
    .hdr h1{font-size:1.3rem;font-weight:700;margin-bottom:3px;}
    .hw{padding:16px;max-width:520px;margin:0 auto;}
    .st{font-size:.7rem;font-weight:700;color:#7f8c8d;letter-spacing:1px;margin:16px 0 9px;}
    .fg{display:flex;flex-direction:column;gap:9px;}
    .fc{background:#fff;border:1px solid #d5e8f0;border-radius:14px;padding:14px 15px;display:flex;align-items:center;gap:13px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.07);border-right:5px solid transparent;width:100%;text-align:right;}
    .ic{font-size:1.9rem;width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;}
    .inf{flex:1;}.nm{font-weight:700;font-size:.93rem;}.ds{font-size:.73rem;color:#7f8c8d;}
    .cb{border-right-color:#2e86c1;}.cg{border-right-color:#1e8449;}.co{border-right-color:#d35400;}.cr{border-right-color:#c0392b;}.ck{border-right-color:#b7950b;}.ct{border-right-color:#148f77;}
    .inner{max-width:520px;margin:0 auto;padding:12px;}
    .phdr{display:flex;align-items:center;gap:10px;padding:15px;color:#fff;background:#1a5276;}
    .bk{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:1.2rem;}
    .card{background:#fff;border:1px solid #d5e8f0;border-radius:10px;padding:12px;margin-bottom:11px;}
    .card h2{font-size:.93rem;color:#1a5276;border-bottom:2px solid #f0f4f8;padding-bottom:5px;margin-bottom:10px;}
    .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:7px;}
    .fl{display:flex;flex-direction:column;flex:1;min-width:110px;}
    label{font-size:.73rem;color:#7f8c8d;margin-bottom:3px;}
    input,select,textarea{border:1px solid #d5e8f0;border-radius:6px;padding:8px;font-size:.84rem;width:100%;background:#f9fbfc;}
    .btn-add{background:#1a5276;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:.75rem;margin:5px 0;}
    .item-row{background:#f8fbff;border:1px solid #eaf2f8;padding:8px;border-radius:8px;margin-bottom:8px;position:relative;}
    .btn-del{position:absolute;left:5px;top:5px;color:#e74c3c;border:none;background:none;cursor:pointer;font-weight:bold;}
    .send-btn{width:100%;padding:14px;background:#25d366;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
</style>
</head>
<body>

<div id="pg-home" style="display:block;">
    <div class="hdr"><h1>🚑 النماذج الميدانية</h1><p>الإصدار المعتمد 2024</p></div>
    <div class="hw">
        <div class="st">نماذج المناوبة</div>
        <div class="fg">
            <button class="fc cb" onclick="show('pg-shift')"><div class="ic">📋</div><div class="inf"><div class="nm">نهاية المناوبة</div><div class="ds">التقرير الشامل للميدان</div></div></button>
            <button class="fc ct" onclick="show('pg-moshr')"><div class="ic">📊</div><div class="inf"><div class="nm">مؤشر المناوبة</div><div class="ds">وقت الاستجابة فقط</div></div></button>
        </div>
        <div class="st">نماذج الصيانة</div>
        <div class="fg">
            <button class="fc cg" onclick="show('pg-oil')"><div class="ic">🛢️</div><div class="inf"><div class="nm">تغيير الزيت</div><div class="ds">بيانات الزيت والعداد</div></div></button>
            <button class="fc co" onclick="show('pg-device')"><div class="ic">🔧</div><div class="inf"><div class="nm">صيانة جهاز</div><div class="ds">الأجهزة الطبية</div></div></button>
            <button class="fc cr" onclick="show('pg-vm')"><div class="ic">🚑</div><div class="inf"><div class="nm">صيانة مركبة</div><div class="ds">الأعطال الميكانيكية</div></div></button>
        </div>
        <div class="st">أخرى</div>
        <div class="fg">
            <button class="fc ck" onclick="show('pg-rosc')"><div class="ic">❤️</div><div class="inf"><div class="nm">تقرير ROSC</div><div class="ds">حالات الإنعاش الناجحة</div></div></button>
        </div>
    </div>
</div>

<div id="pg-shift" class="page">
    <div class="phdr"><button class="bk" onclick="show('pg-home')">›</button><div><b>نموذج نهاية المناوبة</b></div></div>
    <div class="inner">
        <div class="card"><div class="row"><div class="fl"><label>التاريخ</label><input type="date" id="s-date"></div><div class="fl"><label>الفترة</label><select id="s-period"><option>صباحية</option><option>مسائية</option></select></div></div></div>
        <div class="card"><h2>📊 المؤشر</h2><input type="text" id="s-ir" placeholder="متوسط وقت الاستجابة"><textarea id="s-in" placeholder="ملاحظات المؤشر"></textarea></div>
        <div class="card"><h2>⚡ التدخل السريع</h2><div id="s-fast-list"></div><button class="btn-add" onclick="addItem('s-fast-list','استجابة')">➕ استجابة</button> <button class="btn-add" onclick="addItem('s-fast-list','استجابة داعمة')">➕ استجابة داعمة</button></div>
        <div class="card"><h2>🚑 المركبات</h2><div class="row"><div class="fl"><label>عاملة</label><input type="number" id="s-v-ok"></div><div class="fl"><label>احتياط</label><input type="number" id="s-v-res"></div><div class="fl"><label>عطل</label><input type="number" id="s-v-bad"></div></div><textarea id="s-v-note" placeholder="تفاصيل الأعطال"></textarea></div>
        <div class="card"><h2>👥 الغياب</h2><div id="s-abs-list"></div><button class="btn-add" onclick="addItem('s-abs-list','الاسم')">➕ إضافة اسم</button></div>
        <div class="card"><h2>👤 الطاقم</h2><input type="text" id="s-chief" placeholder="كبير المسعفين"><input type="text" id="s-asst" placeholder="المساعد"></div>
        <button class="send-btn" onclick="sendShift()">📤 إرسال للواتساب</button>
    </div>
</div>

<div id="pg-moshr" class="page">
    <div class="phdr" style="background:#148f77;"><button class="bk" onclick="show('pg-home')">›</button><div><b>مؤشر المناوبة</b></div></div>
    <div class="inner">
        <div class="card"><label>التاريخ</label><input type="date" id="m-date"><label>وقت الاستجابة</label><input type="text" id="m-val"><label>الختام</label><select id="m-end"><option value="بفخر واعتزاز نتقدم بجزيل الشكر لجهود الزملاء 🌹">تقدير 1</option><option value="الله يعطيكم العافية جميعاً 🌹">تحية 2</option></select></div>
        <button class="send-btn" style="background:#148f77" onclick="sendMoshr()">📤 إرسال</button>
    </div>
</div>

<div id="pg-oil" class="page">
    <div class="phdr" style="background:#1e8449;"><button class="bk" onclick="show('pg-home')">›</button><div><b>تغيير الزيت</b></div></div>
    <div class="inner">
        <div class="card"><label>رقم المركبة</label><input type="text" id="o-num"><label>العداد</label><input type="text" id="o-km"><label>الموقع</label><input type="text" id="o-loc"></div>
        <button class="send-btn" style="background:#1e8449" onclick="sendOil()">📤 إرسال</button>
    </div>
</div>

<div id="pg-vm" class="page">
    <div class="phdr" style="background:#c0392b;"><button class="bk" onclick="show('pg-home')">›</button><div><b>صيانة مركبة</b></div></div>
    <div class="inner">
        <div class="card"><label>رقم المركبة</label><input type="text" id="v-num"><label>الأولوية</label><select id="v-pri"><option>عادية</option><option>عاجلة</option></select><label>العطل</label><textarea id="v-desc"></textarea></div>
        <button class="send-btn" style="background:#c0392b" onclick="sendVM()">📤 إرسال</button>
    </div>
</div>

<div id="pg-device" class="page">
    <div class="phdr" style="background:#d35400;"><button class="bk" onclick="show('pg-home')">›</button><div><b>صيانة جهاز</b></div></div>
    <div class="inner">
        <div class="card"><label>اسم الجهاز</label><input type="text" id="d-name"><label>المشكلة</label><textarea id="d-prob"></textarea></div>
        <button class="send-btn" style="background:#d35400" onclick="sendDevice()">📤 إرسال</button>
    </div>
</div>

<div id="pg-rosc" class="page">
    <div class="phdr" style="background:#b7950b;"><button class="bk" onclick="show('pg-home')">›</button><div><b>نموذج ROSC</b></div></div>
    <div class="inner">
        <div class="card"><label>رقم البلاغ</label><input type="text" id="r-num"><label>الموقع</label><input type="text" id="r-loc"><label>التفاصيل</label><textarea id="r-det"></textarea></div>
        <button class="send-btn" style="background:#b7950b" onclick="sendRosc()">📤 إرسال</button>
    </div>
</div>

<script>
    function show(id){
        document.querySelectorAll('.page, #pg-home').forEach(p=>p.style.display='none');
        document.getElementById(id).style.display='block';
        window.scrollTo(0,0);
    }

    function addItem(cid, lbl){
        const c=document.getElementById(cid);
        const d=document.createElement('div');
        d.className='item-row';
        d.innerHTML=`<small>${lbl}:</small><input type="text" class="iv" data-l="${lbl}"><button class="btn-del" onclick="this.parentElement.remove()">✕</button>`;
        c.appendChild(d);
    }

    // الحل الجذري للرموز: استخدام URI Encoding مع معالجة String صريحة
    function send(txt){
        var finalTxt = txt.replace(/\n/g, '%0A');
        window.open("https://wa.me/?text=" + encodeURIComponent(txt), '_blank');
    }

    function sendShift(){
        let m = `*📋 نموذج نهاية المناوبة*\n➖➖➖➖➖➖➖➖\n`;
        m += `📅 التاريخ: ${document.getElementById('s-date').value}\n🕒 الفترة: ${document.getElementById('s-period').value}\n\n`;
        m += `📊 *المؤشر:*\n⏱️ الاستجابة: ${document.getElementById('s-ir').value} د\n📝 ملاحظة: ${document.getElementById('s-in').value}\n\n`;
        m += `⚡ *التدخل السريع:*\n`;
        document.querySelectorAll('#s-fast-list .iv').forEach(i=>{ if(i.value) m+=`🔹 ${i.getAttribute('data-l')}: ${i.value}\n`; });
        m += `\n🚑 *المركبات:*\n✅ عاملة: ${document.getElementById('s-v-ok').value}\n⏳ احتياط: ${document.getElementById('s-v-res').value}\n❌ عطل: ${document.getElementById('s-v-bad').value}\n`;
        if(document.getElementById('s-v-note').value) m+=`⚠️ ملاحظة: ${document.getElementById('s-v-note').value}\n`;
        let abs = Array.from(document.querySelectorAll('#s-abs-list input')).map(i=>i.value).filter(v=>v);
        if(abs.length) m+=`\n👥 *الغياب:*\n- ${abs.join('\n- ')}\n`;
        m += `\n👤 *الطاقم:*\n- كبير: ${document.getElementById('s-chief').value}\n- مساعد: ${document.getElementById('s-asst').value}`;
        send(m);
    }

    function sendMoshr(){
        send(`*📊 مؤشر المناوبة*\n\n📅 التاريخ: ${document.getElementById('m-date').value}\n⏱️ الاستجابة: ${document.getElementById('m-val').value}\n\n${document.getElementById('m-end').value}`);
    }

    function sendOil(){
        send(`*🛢️ تغيير الزيت*\n\n🚑 رقم: ${document.getElementById('o-num').value}\n🛣️ العداد: ${document.getElementById('o-km').value}\n📍 الموقع: ${document.getElementById('o-loc').value}`);
    }

    function sendVM(){
        send(`*🚑 صيانة مركبة*\n\n🔢 رقم: ${document.getElementById('v-num').value}\n🚩 الأولوية: ${document.getElementById('v-pri').value}\n🛠️ العطل: ${document.getElementById('v-desc').value}`);
    }

    function sendDevice(){
        send(`*🔧 صيانة جهاز*\n\n📟 الجهاز: ${document.getElementById('d-name').value}\n⚠️ المشكلة: ${document.getElementById('d-prob').value}`);
    }

    function sendRosc(){
        send(`*❤️ تقرير ROSC*\n\n🔢 رقم البلاغ: ${document.getElementById('r-num').value}\n📍 الموقع: ${document.getElementById('r-loc').value}\n📝 التفاصيل: ${document.getElementById('r-det').value}`);
    }

    window.onload = function(){
        let t = new Date().toISOString().split('T')[0];
        document.querySelectorAll('input[type="date"]').forEach(i=>i.value=t);
    };
</script>
</body>
</html>
