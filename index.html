<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النماذج الميدانية</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f4f8;color:#1c2833;min-height:100vh;}
.page{display:none;min-height:100vh;background:#f0f4f8;}
.hdr{color:#fff;padding:20px 16px 16px;text-align:center;background:linear-gradient(135deg,#1a5276,#1f618d);box-shadow:0 3px 10px rgba(0,0,0,.2);}
.hdr h1{font-size:1.3rem;font-weight:700;margin-bottom:3px;}
.hdr p{font-size:.75rem;opacity:.8;}
.hw{padding:16px;max-width:520px;margin:0 auto;}
.st{font-size:.7rem;font-weight:700;color:#7f8c8d;letter-spacing:1px;margin:16px 0 9px;}
.fg{display:flex;flex-direction:column;gap:9px;}
.fc{background:#fff;border:1px solid #d5e8f0;border-radius:14px;padding:14px 15px;display:flex;align-items:center;gap:13px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.07);border-right:5px solid transparent;width:100%;text-align:right;font-family:inherit;}
.fc:active{opacity:.85;}
.ic{font-size:1.9rem;width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.inf{flex:1;}.nm{font-weight:700;font-size:.93rem;margin-bottom:2px;}.ds{font-size:.73rem;color:#7f8c8d;}.ar{color:#7f8c8d;font-size:1.1rem;}
.cb{border-right-color:#2e86c1;}.cb .ic{background:#eaf4fb;}
.cg{border-right-color:#1e8449;}.cg .ic{background:#eafaf1;}
.co{border-right-color:#d35400;}.co .ic{background:#fef5e7;}
.cr{border-right-color:#c0392b;}.cr .ic{background:#fdedec;}
.ck{border-right-color:#b7950b;}.ck .ic{background:#fef9e7;}
.ct{border-right-color:#148f77;}.ct .ic{background:#e8f8f5;}
.inner{max-width:520px;margin:0 auto;padding:12px;}
.phdr{display:flex;align-items:center;gap:10px;padding:13px 15px;color:#fff;}
.bk{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:8px;padding:5px 13px;cursor:pointer;font-size:1.3rem;line-height:1;}
.pt{font-weight:700;font-size:1rem;}.ps{font-size:.73rem;opacity:.8;}
.card{background:#fff;border:1px solid #d5e8f0;border-radius:10px;padding:12px;margin-bottom:11px;box-shadow:0 2px 7px rgba(0,0,0,.05);}
.card h2{font-size:.93rem;color:#1a5276;border-bottom:2px solid #d5e8f0;padding-bottom:5px;margin-bottom:9px;}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:7px;align-items:flex-start;}
.fl{display:flex;flex-direction:column;flex:1;min-width:115px;}
.fl label{font-size:.73rem;color:#7f8c8d;margin-bottom:3px;}
.ff{display:flex;flex-direction:column;margin-bottom:8px;}
.ff label{font-size:.73rem;color:#7f8c8d;margin-bottom:3px;}
input[type=text],input[type=date],select,textarea{border:1px solid #d5e8f0;border-radius:6px;padding:6px 8px;font-size:.84rem;font-family:inherit;color:#1c2833;background:#f9fbfc;width:100%;direction:rtl;}
textarea{resize:vertical;min-height:54px;}
.rg{display:flex;gap:11px;margin-top:3px;flex-wrap:wrap;}
.rg label{display:flex;align-items:center;gap:4px;font-size:.84rem;cursor:pointer;}
.shdr{display:flex;justify-content:space-between;align-items:center;background:#1a5276;color:#fff;border-radius:6px;padding:6px 9px;margin-bottom:7px;font-size:.83rem;font-weight:700;}
.iblk{border:1px solid #d5e8f0;border-radius:7px;padding:9px;margin-bottom:7px;background:#f9fbff;}
.btn{border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:.8rem;font-family:inherit;display:inline-flex;align-items:center;gap:4px;}
.bp{background:#1a5276;color:#fff;}
.bsm{padding:4px 8px;font-size:.73rem;}
.bo2{background:#fff;border:1px solid #1a5276;color:#1a5276;}
.add-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.pi{display:flex;align-items:center;gap:6px;background:#f9f9f9;border:1px solid #d5e8f0;border-radius:6px;padding:5px 8px;margin-bottom:5px;}
.pi input{flex:1;}
.dvd{border:none;border-top:1px dashed #d5e8f0;margin:6px 0;}
.send-btn{width:100%;padding:12px;background:#25d366;color:#fff;border:none;border-radius:8px;font-size:.98rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;}
.prev-box{background:#f0f9f4;border:1px solid #a9dfbf;border-radius:8px;padding:10px;font-size:.82rem;line-height:1.85;white-space:pre-wrap;direction:rtl;min-height:80px;margin-top:8px;}
.nr{display:flex;align-items:center;gap:6px;background:#f9f9f9;border:1px solid #d5e8f0;border-radius:6px;padding:5px 8px;margin-bottom:5px;}
.rm{background:none;border:none;color:#e74c3c;cursor:pointer;font-size:1rem;padding:0 3px;}
</style>
</head>
<body>

<div id="pg-home" style="display:block;">
  <div class="hdr">
    <h1>🚑 نظام النماذج الميدانية</h1>
    <p>اختر النموذج المطلوب</p>
  </div>
  <div class="hw">
    <div class="st">نماذج المناوبة</div>
    <div class="fg">
      <button class="fc cb" id="btn-go-shift"><div class="ic">📋</div><div class="inf"><div class="nm">نموذج نهاية المناوبة</div><div class="ds">البلاغات والمركبات والغياب والطاقم</div></div><div class="ar">‹</div></button>
      <button class="fc ct" id="btn-go-moshr"><div class="ic">📊</div><div class="inf"><div class="nm">مؤشر المناوبة</div><div class="ds">متوسط وقت الاستجابة وجملة الختام</div></div><div class="ar">‹</div></button>
    </div>
    <div class="st">نماذج الصيانة</div>
    <div class="fg">
      <button class="fc cg" id="btn-go-oil"><div class="ic">🛢️</div><div class="inf"><div class="nm">نموذج تغيير الزيت</div><div class="ds">تسجيل بيانات تغيير زيت المركبات</div></div><div class="ar">‹</div></button>
      <button class="fc co" id="btn-go-device"><div class="ic">🔧</div><div class="inf"><div class="nm">نموذج صيانة جهاز</div><div class="ds">صيانة الأجهزة الطبية والميدانية</div></div><div class="ar">‹</div></button>
      <button class="fc cr" id="btn-go-vm"><div class="ic">🚑</div><div class="inf"><div class="nm">نموذج صيانة مركبة</div><div class="ds">تسجيل أعطال وطلبات الصيانة</div></div><div class="ar">‹</div></button>
    </div>
    <div class="st">نماذج أخرى</div>
    <div class="fg">
      <button class="fc ck" id="btn-go-rosc"><div class="ic">❤️</div><div class="inf"><div class="nm">نموذج ROSC</div><div class="ds">تقرير إنعاش قلبي رئوي ناجح</div></div><div class="ar">‹</div></button>
    </div>
  </div>
</div>

<div id="pg-shift" class="page">
  <div class="phdr" style="background:linear-gradient(135deg,#1a5276,#1f618d)">
    <button class="bk" id="bk-shift">›</button>
    <div><div class="pt">نموذج نهاية المناوبة</div><div class="ps">تقرير شامل للمناوبة</div></div>
  </div>
  <div class="inner">
    <div class="card">
      <div class="row">
        <div class="fl"><label>التاريخ</label><input type="date" id="s-date"></div>
        <div class="fl"><label>الفترة</label>
          <div class="rg">
            <label><input type="radio" name="sp" value="صباحية" checked> صباحية</label>
            <label><input type="radio" name="sp" value="مسائية"> مسائية</label>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <h2>📊 المؤشر</h2>
      <div class="ff"><label>متوسط وقت الاستجابة (دقيقة)</label><input type="text" id="s-ir" placeholder="دقيقة"></div>
      <div class="ff"><label>ملاحظات المؤشر</label><textarea id="s-in" placeholder="ملاحظات..."></textarea></div>
    </div>
    <div class="card">
      <h2>🚗 المركبات</h2>
      <div class="row">
        <div class="fl"><label>عاملة</label><input type="text" id="s-vw"></div>
        <div class="fl"><label>احتياط</label><input type="text" id="s-vr"></div>
        <div class="fl"><label>متعطلة</label><input type="text" id="s-vb"></div>
      </div>
      <div class="ff"><label>ملاحظات الأعطال</label><textarea id="s-vn" placeholder="ملاحظات..."></textarea></div>
    </div>
    <div class="card">
      <h2>📋 بلاغات التدخل السريع</h2>
      <div id="s-secs"></div>
      <button class="btn bo2 bsm" id="btn-add-sec">➕ إضافة قطاع</button>
    </div>
    <div class="card">
      <h2>👤 الغياب والمتأخرين</h2>
      <div id="s-abs"></div>
      <button class="btn bo2 bsm" id="btn-add-abs">➕ إضافة غياب</button>
      <hr class="dvd">
      <div id="s-lat"></div>
      <button class="btn bo2 bsm" id="btn-add-lat">➕ إضافة متأخر</button>
    </div>
    <button class="send-btn" id="btn-s-send">📤 إرسال على الواتساب</button>
  </div>
</div>

<div id="pg-moshr" class="page">
  <div class="phdr" style="background:linear-gradient(135deg,#148f77,#1abc9c)">
    <button class="bk" id="bk-moshr">›</button>
    <div><div class="pt">مؤشر المناوبة</div><div class="ps">قطاع الوسط</div></div>
  </div>
  <div class="inner">
    <div class="card">
      <div class="ff"><label>التاريخ</label><input type="date" id="m-d"></div>
      <div class="ff"><label>المناوبة</label>
        <div class="rg">
          <label><input type="radio" name="mp" value="صباحية" checked> صباحية</label>
          <label><input type="radio" name="mp" value="مسائية"> مسائية</label>
        </div>
      </div>
      <div class="ff"><label>متوسط وقت الاستجابة</label><input type="text" id="m-r" placeholder="مثال: 8 دقائق"></div>
    </div>
    <div class="card">
      <h2>💬 جملة الختام</h2>
      <select id="m-ph">
        <option value="">-- بدون جملة --</option>
        <option value="الله يعطيكم العافية جميعاً ماقصرتوا 🌹">الله يعطيكم العافية جميعاً ماقصرتوا 🌹</option>
        <option value="جزاكم الله خيراً على جهودكم المبذولة 🌹">جزاكم الله خيراً على جهودكم المبذولة 🌹</option>
      </select>
    </div>
    <button class="send-btn" style="background:#148f77" id="btn-m-send">📤 إرسال على الواتساب</button>
  </div>
</div>

<script>
(function() {
  "use strict";

  function el(id) { return document.getElementById(id); }
  function gv(id) { var e = el(id); return e ? e.value.trim() : ''; }
  function on(id, ev, fn) { var e = el(id); if (e) e.addEventListener(ev, fn); }

  function show(id) {
    document.getElementById('pg-home').style.display = 'none';
    var pages = document.getElementsByClassName('page');
    for (var i = 0; i < pages.length; i++) pages[i].style.display = 'none';
    el(id).style.display = 'block';
  }

  // Navigation
  on('btn-go-shift', 'click', function() { show('pg-shift'); });
  on('btn-go-moshr', 'click', function() { show('pg-moshr'); });
  on('bk-shift', 'click', function() { show('pg-home'); el('pg-home').style.display='block'; });
  on('bk-moshr', 'click', function() { show('pg-home'); el('pg-home').style.display='block'; });

  // WhatsApp Messaging with formatted emojis
  on('btn-s-send', 'click', function() {
    var line = "➖➖➖➖➖➖➖➖➖➖";
    var per = document.querySelector('input[name="sp"]:checked')?.value || '—';
    
    var msg = line + "\n";
    msg += "📋 *نموذج نهاية المناوبة*\n";
    msg += line + "\n\n";
    
    msg += "📅 *التاريخ:* " + (gv('s-date') || '—') + "\n";
    msg += "🕒 *الفترة:* " + per + "\n\n";
    
    msg += "📊 *[ المؤشر ]*\n";
    msg += "⏱️ *متوسط الاستجابة:* " + (gv('s-ir') || '—') + " دقيقة\n";
    if(gv('s-in')) msg += "📝 *ملاحظات:* " + gv('s-in') + "\n";
    
    msg += "\n🚑 *[ المركبات ]*\n";
    msg += "✅ *عاملة:* " + (gv('s-vw') || '0') + "\n";
    msg += "⏳ *احتياط:* " + (gv('s-vr') || '0') + "\n";
    msg += "❌ *عطل:* " + (gv('s-vb') || '0') + "\n";
    
    var url = "https://wa.me/?text=" + encodeURIComponent(msg);
    window.open(url, '_blank');
  });

  on('btn-m-send', 'click', function() {
    var per = document.querySelector('input[name="mp"]:checked')?.value || '—';
    var msg = "📊 *مؤشر المناوبة*\n\n";
    msg += "📅 *التاريخ:* " + gv('m-d') + "\n";
    msg += "🕒 *المناوبة:* " + per + "\n";
    msg += "⏱️ *وقت الاستجابة:* " + gv('m-r') + "\n\n";
    msg += gv('m-ph');
    
    window.open("https://wa.me/?text=" + encodeURIComponent(msg), '_blank');
  });

})();
</script>
</body>
</html>
